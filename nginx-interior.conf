# Nginx configuration for interior service
# Place this file in /etc/nginx/sites-available/ and create symlink in /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name vshakago.in www.vshakago.in;

    # Redirect HTTP to HTTPS
    location /interiors {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name vshakago.in www.vshakago.in;

    # SSL Certificate paths (adjust if your certificates are in different location)
    ssl_certificate /etc/letsencrypt/live/vshakago.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vshakago.in/privkey.pem;
    
    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Interior service location
    location /interiors {
        rewrite ^/interiors(/.*)$ $1 break;
        proxy_pass http://localhost:3006;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Handle Vite HMR WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Existing locations for other services should remain here
    # location / { ... }
    # location /admin { ... }
    # etc.
}
