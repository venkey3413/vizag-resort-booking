<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Management</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f1117;
            --surface: #181b23;
            --surface2: #1e2130;
            --border: rgba(255,255,255,0.07);
            --border2: rgba(255,255,255,0.12);
            --text: #e8eaf0;
            --text2: #8b90a0;
            --accent: #4f8eff;
            --green: #34d399;
            --green-bg: rgba(52,211,153,0.1);
            --red: #f87171;
            --red-bg: rgba(248,113,113,0.1);
            --amber: #fbbf24;
            --amber-bg: rgba(251,191,36,0.1);
            --blue-bg: rgba(79,142,255,0.1);
            --radius: 10px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-size: 14px;
            line-height: 1.5;
        }

        header {
            padding: 20px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
        }

        header h1 {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        header span {
            font-size: 12px;
            color: var(--text2);
            font-family: 'DM Mono', monospace;
        }

        .live-dot {
            display: inline-block;
            width: 7px; height: 7px;
            background: var(--green);
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .stats-bar {
            display: flex;
            gap: 1px;
            background: var(--border);
            border-bottom: 1px solid var(--border);
        }

        .stat {
            flex: 1;
            background: var(--surface);
            padding: 16px 24px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-num {
            font-size: 22px;
            font-weight: 600;
            font-family: 'DM Mono', monospace;
            letter-spacing: -0.02em;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .tabs {
            display: flex;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
        }

        .tab-btn {
            padding: 14px 20px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text2);
            cursor: pointer;
            border: none;
            background: none;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
            font-family: inherit;
        }

        .tab-btn:hover { color: var(--text); }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        .tab-panel { display: none; padding: 24px; }
        .tab-panel.active { display: block; }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .refresh-btn {
            font-size: 12px;
            color: var(--text2);
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 6px;
            padding: 5px 12px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }

        .refresh-btn:hover { color: var(--text); border-color: var(--accent); }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text2);
            font-size: 13px;
        }

        .booking-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 12px;
            overflow: hidden;
            transition: border-color 0.15s;
        }

        .booking-card:hover { border-color: var(--border2); }

        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
        }

        .card-id {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            font-weight: 500;
            color: var(--accent);
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge {
            font-size: 11px;
            font-weight: 500;
            padding: 3px 9px;
            border-radius: 20px;
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.02em;
        }

        .badge-pending  { background: var(--amber-bg); color: var(--amber); }
        .badge-confirmed, .badge-paid { background: var(--green-bg); color: var(--green); }
        .badge-cancelled { background: var(--red-bg); color: var(--red); }

        .card-body {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 0;
        }

        .field {
            padding: 12px 18px;
            border-right: 1px solid var(--border);
        }

        .field:last-child { border-right: none; }

        .field-label {
            font-size: 10px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 3px;
        }

        .field-value {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
        }

        .field-value.mono {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            padding: 12px 18px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .btn {
            font-size: 12px;
            font-weight: 500;
            padding: 7px 14px;
            border-radius: 7px;
            cursor: pointer;
            border: 1px solid transparent;
            font-family: inherit;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-confirm {
            background: var(--green-bg);
            color: var(--green);
            border-color: rgba(52,211,153,0.2);
        }

        .btn-confirm:hover:not(:disabled) {
            background: rgba(52,211,153,0.2);
        }

        .btn-cancel {
            background: var(--red-bg);
            color: var(--red);
            border-color: rgba(248,113,113,0.2);
        }

        .btn-cancel:hover:not(:disabled) {
            background: rgba(248,113,113,0.2);
        }

        .btn-email {
            background: var(--blue-bg);
            color: var(--accent);
            border-color: rgba(79,142,255,0.2);
        }

        .btn-email:hover:not(:disabled) {
            background: rgba(79,142,255,0.2);
        }

        .btn-whatsapp {
            background: rgba(37,211,102,0.1);
            color: #25d366;
            border-color: rgba(37,211,102,0.2);
        }

        .btn-whatsapp:hover:not(:disabled) {
            background: rgba(37,211,102,0.2);
        }

        .btn-delete {
            background: transparent;
            color: var(--text2);
            border-color: var(--border2);
            margin-left: auto;
        }

        .btn-delete:hover:not(:disabled) {
            color: var(--red);
            border-color: rgba(248,113,113,0.3);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: var(--radius);
            padding: 12px 18px;
            font-size: 13px;
            z-index: 999;
            display: none;
            max-width: 320px;
            animation: slideUp 0.2s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .toast.success { border-color: rgba(52,211,153,0.3); color: var(--green); }
        .toast.error { border-color: rgba(248,113,113,0.3); color: var(--red); }

        .loading-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 40px 20px;
            color: var(--text2);
            font-size: 13px;
        }

        .spinner {
            width: 16px; height: 16px;
            border: 2px solid var(--border2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .stats-bar { flex-wrap: wrap; }
            .card-body { grid-template-columns: 1fr 1fr; }
            .field { border-right: none; border-bottom: 1px solid var(--border); }
        }
    </style>
</head>
<body>

<header>
    <h1>Booking Management</h1>
    <span><span class="live-dot"></span>Live updates via Redis</span>
</header>

<div class="stats-bar">
    <div class="stat">
        <div class="stat-num" id="stat-pending">0</div>
        <div class="stat-label">Pending</div>
    </div>
    <div class="stat">
        <div class="stat-num" id="stat-confirmed">0</div>
        <div class="stat-label">Confirmed</div>
    </div>
    <div class="stat">
        <div class="stat-num" id="stat-cancelled">0</div>
        <div class="stat-label">Cancelled</div>
    </div>
    <div class="stat">
        <div class="stat-num" id="stat-revenue">₹0</div>
        <div class="stat-label">Revenue</div>
    </div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('resort', this)">Resort Bookings <span id="resort-count" style="opacity:0.5;margin-left:4px;font-size:11px;"></span></button>
    <button class="tab-btn" onclick="switchTab('event', this)">Event Bookings <span id="event-count" style="opacity:0.5;margin-left:4px;font-size:11px;"></span></button>
</div>

<div id="tab-resort" class="tab-panel active">
    <div class="section-header">
        <span class="section-title">Resort Bookings</span>
        <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
    </div>
    <div id="resort-list"><div class="loading-row"><div class="spinner"></div> Loading...</div></div>
</div>

<div id="tab-event" class="tab-panel">
    <div class="section-header">
        <span class="section-title">Event Bookings</span>
        <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
    </div>
    <div id="event-list"><div class="loading-row"><div class="spinner"></div> Loading...</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
let resortBookings = [];
let eventBookings = [];

function switchTab(name, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
}

function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type;
    t.style.display = 'block';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.style.display = 'none', 3500);
}

function badgeClass(status) {
    if (!status) return 'badge-pending';
    const s = status.toLowerCase();
    if (s.includes('confirm') || s === 'paid') return 'badge-confirmed';
    if (s.includes('cancel')) return 'badge-cancelled';
    return 'badge-pending';
}

function badgeLabel(status) {
    if (!status) return 'PENDING';
    const s = status.toLowerCase();
    if (s.includes('confirm') || s === 'paid') return 'CONFIRMED';
    if (s.includes('cancel')) return 'CANCELLED';
    return 'PENDING';
}

function updateStats() {
    const all = [...resortBookings, ...eventBookings];
    const pending = all.filter(b => {
        const s = (b.status || b.payment_status || '').toLowerCase();
        return !s.includes('confirm') && s !== 'paid' && !s.includes('cancel');
    }).length;
    const confirmed = all.filter(b => {
        const s = (b.status || b.payment_status || '').toLowerCase();
        return s.includes('confirm') || s === 'paid';
    }).length;
    const cancelled = all.filter(b => (b.status || b.payment_status || '').toLowerCase().includes('cancel')).length;
    const revenue = all
        .filter(b => { const s = (b.status || b.payment_status || '').toLowerCase(); return s.includes('confirm') || s === 'paid'; })
        .reduce((sum, b) => sum + parseInt(b.total_price || 0), 0);

    document.getElementById('stat-pending').textContent = pending;
    document.getElementById('stat-confirmed').textContent = confirmed;
    document.getElementById('stat-cancelled').textContent = cancelled;
    document.getElementById('stat-revenue').textContent = '₹' + revenue.toLocaleString('en-IN');
    document.getElementById('resort-count').textContent = resortBookings.length;
    document.getElementById('event-count').textContent = eventBookings.length;
}

// ── Resort Bookings ──────────────────────────────────────────────────────────

function renderResortBookings() {
    const el = document.getElementById('resort-list');
    if (!resortBookings.length) {
        el.innerHTML = '<div class="empty">No resort bookings yet.</div>';
        return;
    }

    el.innerHTML = resortBookings.map(b => {
        const status = b.payment_status || b.status || 'pending';
        const isPending = !status.includes('confirm') && status !== 'paid' && !status.includes('cancel');
        const isConfirmed = status.includes('confirm') || status === 'paid';

        return `
        <div class="booking-card">
            <div class="card-top">
                <span class="card-id">${b.booking_reference || 'RB' + String(b.id).padStart(6,'0')}</span>
                <div class="card-meta">
                    <span class="badge ${badgeClass(status)}">${badgeLabel(status)}</span>
                    <span style="font-size:11px;color:var(--text2);">${new Date(b.booking_date || b.created_at).toLocaleDateString('en-IN')}</span>
                </div>
            </div>
            <div class="card-body">
                <div class="field"><div class="field-label">Guest</div><div class="field-value">${b.guest_name}</div></div>
                <div class="field"><div class="field-label">Resort</div><div class="field-value">${b.resort_name || 'Resort #' + b.resort_id}</div></div>
                <div class="field"><div class="field-label">Check-in</div><div class="field-value">${new Date(b.check_in).toLocaleDateString('en-IN')}</div></div>
                <div class="field"><div class="field-label">Check-out</div><div class="field-value">${new Date(b.check_out).toLocaleDateString('en-IN')}</div></div>
                <div class="field"><div class="field-label">Guests</div><div class="field-value">${b.guests}</div></div>
                <div class="field"><div class="field-label">Amount</div><div class="field-value">₹${parseInt(b.total_price || 0).toLocaleString('en-IN')}</div></div>
                <div class="field"><div class="field-label">Phone</div><div class="field-value mono">${b.phone}</div></div>
                <div class="field"><div class="field-label">UTR / Txn ID</div><div class="field-value mono">${b.transaction_id || '—'}</div></div>
            </div>
            <div class="card-actions">
                ${isPending ? `<button class="btn btn-confirm" onclick="confirmResort(${b.id}, this)">✓ Confirm</button>` : ''}
                ${!status.includes('cancel') ? `<button class="btn btn-cancel" onclick="cancelResort(${b.id}, this)">✕ Cancel</button>` : ''}
                ${isConfirmed ? `<button class="btn btn-email" onclick="sendResortEmail(${b.id}, this)">✉ Send Email</button>` : ''}
                <a class="btn btn-whatsapp" href="https://wa.me/${(b.phone||'').replace(/[^0-9]/g,'')}" target="_blank">💬 WhatsApp</a>
                <button class="btn btn-delete" onclick="deleteResort(${b.id}, this)">🗑 Delete</button>
            </div>
        </div>`;
    }).join('');
}

async function confirmResort(id, btn) {
    btn.disabled = true; btn.textContent = 'Confirming...';
    try {
        const res = await fetch(`/api/bookings/${id}/confirm`, { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        showToast('Booking confirmed! Email ' + (data.emailSent ? 'sent ✓' : 'failed ✗'));
        if (data.whatsappUrl) window.open(data.whatsappUrl, '_blank');
        await loadAll();
    } catch (e) {
        showToast('Error: ' + e.message, 'error');
        btn.disabled = false; btn.textContent = '✓ Confirm';
    }
}

async function cancelResort(id, btn) {
    if (!confirm('Cancel this resort booking?')) return;
    btn.disabled = true; btn.textContent = 'Cancelling...';
    try {
        const res = await fetch(`/api/bookings/${id}/cancel`, { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        showToast('Booking cancelled. Email ' + (data.emailSent ? 'sent ✓' : 'failed ✗'));
        if (data.whatsappUrl) window.open(data.whatsappUrl, '_blank');
        await loadAll();
    } catch (e) {
        showToast('Error: ' + e.message, 'error');
        btn.disabled = false; btn.textContent = '✕ Cancel';
    }
}

async function sendResortEmail(id, btn) {
    btn.disabled = true; btn.textContent = 'Sending...';
    try {
        const res = await fetch(`/api/bookings/${id}/send-email`, { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        showToast(data.success ? 'Email sent successfully ✓' : 'Email failed ✗', data.success ? 'success' : 'error');
    } catch (e) {
        showToast('Error: ' + e.message, 'error');
    } finally {
        btn.disabled = false; btn.textContent = '✉ Send Email';
    }
}

async function deleteResort(id, btn) {
    if (!confirm('Permanently delete this booking?')) return;
    btn.disabled = true;
    try {
        await fetch(`/api/bookings/${id}`, { method: 'DELETE' });
        showToast('Booking deleted');
        await loadAll();
    } catch (e) {
        showToast('Error: ' + e.message, 'error');
        btn.disabled = false;
    }
}

// ── Event Bookings ───────────────────────────────────────────────────────────

function renderEventBookings() {
    const el = document.getElementById('event-list');
    if (!eventBookings.length) {
        el.innerHTML = '<div class="empty">No event bookings yet.</div>';
        return;
    }

    el.innerHTML = eventBookings.map(b => {
        const status = b.status || 'pending_verification';
        const isPending = !status.includes('confirm') && !status.includes('cancel');
        const isConfirmed = status.includes('confirm');

        return `
        <div class="booking-card">
            <div class="card-top">
                <span class="card-id">${b.booking_reference}</span>
                <div class="card-meta">
                    <span class="badge ${badgeClass(status)}">${badgeLabel(status)}</span>
                    <span style="font-size:11px;color:var(--text2);">${new Date(b.created_at).toLocaleDateString('en-IN')}</span>
                </div>
            </div>
            <div class="card-body">
                <div class="field"><div class="field-label">Guest</div><div class="field-value">${b.guest_name}</div></div>
                <div class="field"><div class="field-label">Event</div><div class="field-value">${b.event_name}</div></div>
                <div class="field"><div class="field-label">Event Date</div><div class="field-value">${new Date(b.event_date).toLocaleDateString('en-IN')}</div></div>
                <div class="field"><div class="field-label">Guests</div><div class="field-value">${b.guests}</div></div>
                <div class="field"><div class="field-label">Amount</div><div class="field-value">₹${parseInt(b.total_price || 0).toLocaleString('en-IN')}</div></div>
                <div class="field"><div class="field-label">Phone</div><div class="field-value mono">${b.phone}</div></div>
                <div class="field"><div class="field-label">Email</div><div class="field-value">${b.email}</div></div>
                <div class="field"><div class="field-label">UTR / Txn ID</div><div class="field-value mono">${b.transaction_id || '—'}</div></div>
            </div>
            <div class="card-actions">
                ${isPending ? `<button class="btn btn-confirm" onclick="confirmEvent(${b.id}, this)">✓ Confirm</button>` : ''}
                ${!status.includes('cancel') ? `<button class="btn btn-cancel" onclick="cancelEvent(${b.id}, this)">✕ Cancel</button>` : ''}
                ${isConfirmed ? `<button class="btn btn-email" onclick="sendEventEmail(${b.id}, this)">✉ Send Email</button>` : ''}
                <a class="btn btn-whatsapp" href="https://wa.me/${(b.phone||'').replace(/[^0-9]/g,'')}" target="_blank">💬 WhatsApp</a>
                <button class="btn btn-delete" onclick="deleteEvent(${b.id}, this)">🗑 Delete</button>
            </div>
        </div>`;
    }).join('');
}

async function confirmEvent(id, btn) {
    btn.disabled = true; btn.textContent = 'Confirming...';
    try {
        const res = await fetch(`/api/event-bookings/${id}/confirm`, { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        showToast('Event booking confirmed! Email ' + (data.emailSent ? 'sent ✓' : 'failed ✗'));
        if (data.whatsappUrl) window.open(data.whatsappUrl, '_blank');
        await loadAll();
    } catch (e) {
        showToast('Error: ' + e.message, 'error');
        btn.disabled = false; btn.textContent = '✓ Confirm';
    }
}

async function cancelEvent(id, btn) {
    if (!confirm('Cancel this event booking?')) return;
    btn.disabled = true; btn.textContent = 'Cancelling...';
    try {
        const res = await fetch(`/api/event-bookings/${id}/cancel`, { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        showToast('Event booking cancelled. Email ' + (data.emailSent ? 'sent ✓' : 'failed ✗'));
        if (data.whatsappUrl) window.open(data.whatsappUrl, '_blank');
        await loadAll();
    } catch (e) {
        showToast('Error: ' + e.message, 'error');
        btn.disabled = false; btn.textContent = '✕ Cancel';
    }
}

async function sendEventEmail(id, btn) {
    btn.disabled = true; btn.textContent = 'Sending...';
    try {
        const res = await fetch(`/api/event-bookings/${id}/confirm`, { method: 'POST' });
        const data = await res.json();
        showToast(data.emailSent ? 'Email resent ✓' : 'Email failed ✗', data.emailSent ? 'success' : 'error');
    } catch (e) {
        showToast('Error: ' + e.message, 'error');
    } finally {
        btn.disabled = false; btn.textContent = '✉ Resend Email';
    }
}

// ── Data Loading ─────────────────────────────────────────────────────────────

async function loadAll() {
    try {
        const [r1, r2] = await Promise.all([
            fetch('/api/bookings'),
            fetch('/api/event-bookings')
        ]);
        resortBookings = await r1.json();
        eventBookings = r2.ok ? await r2.json() : [];
        renderResortBookings();
        renderEventBookings();
        updateStats();
    } catch (e) {
        console.error('Load error:', e);
        document.getElementById('resort-list').innerHTML = '<div class="empty">Failed to load. Check server connection.</div>';
    }
}

async function deleteEvent(id, btn) {
    if (!confirm('Permanently delete this event booking?')) return;
    btn.disabled = true;
    try {
        await fetch(`/api/event-bookings/${id}`, { method: 'DELETE' });
        showToast('Event booking deleted');
        await loadAll();
    } catch (e) {
        showToast('Error: ' + e.message, 'error');
        btn.disabled = false;
    }
}

// ── Redis SSE ────────────────────────────────────────────────────────────────

function connectSSE() {
    let es = new EventSource('/api/events-stream');
    let reconnectDelay = 2000;

    es.onmessage = (e) => {
        try {
            const data = JSON.parse(e.data);
            if (data.type && (
                data.type.includes('booking') ||
                data.type.includes('payment') ||
                data.type.includes('event.booking')
            )) {
                loadAll();
            }
        } catch (_) {}
    };

    es.onerror = () => {
        es.close();
        setTimeout(() => { es = connectSSE(); reconnectDelay = Math.min(reconnectDelay * 1.5, 30000); }, reconnectDelay);
    };

    return es;
}

// ── Init ─────────────────────────────────────────────────────────────────────
loadAll();
connectSSE();
</script>
