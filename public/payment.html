<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VshakaGo Payment</title>

<style>
body {
  font-family: Arial;
  background: #f5f7fb;
  margin: 0;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  margin-top: 20px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

h2, h3 {
  text-align: center;
}

.price {
  font-size: 30px;
  font-weight: bold;
  text-align: center;
  color: green;
}

button {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

.phonepe { background: #5f259f; color: white; }
.gpay { background: black; color: white; }
.paytm { background: #00baf2; color: white; }

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

.submit {
  background: green;
  color: white;
}

.note {
  font-size: 13px;
  color: gray;
  text-align: center;
}

.qr-section {
  text-align: center;
  margin-top: 20px;
}

.qr-section img {
  max-width: 200px;
  height: auto;
  border: 1px solid #ddd;
  border-radius: 8px;
  margin: 15px 0;
}

.upi-details {
  background: #f0f0f0;
  padding: 15px;
  border-radius: 8px;
  margin-top: 15px;
  text-align: center;
}

.upi-details p {
  margin: 8px 0;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <!-- Booking Details -->
  <div class="card">
    <h2>Complete Payment</h2>

    <p><b>Booking ID:</b> <span id="bookingId"></span></p>
    <p><b>Resort:</b> <span id="resort"></span></p>
    <p><b>Date:</b> <span id="date"></span></p>

    <div class="price">₹<span id="amount"></span></div>

    <p class="note">Pay exact amount only</p>
  </div>

  <!-- UPI Buttons -->
  <div class="card">
    <h3>Select Payment App</h3>

    <button class="phonepe" onclick="pay('phonepe')">PhonePe</button>
    <button class="gpay" onclick="pay('gpay')">Google Pay</button>
    <button class="paytm" onclick="pay('paytm')">Paytm</button>

    <p class="note">You will be redirected to UPI app</p>
  </div>

  <!-- QR Code Section -->
  <div class="card qr-section">
    <h3>Scan to Pay</h3>
    <img src="qr-code.png.jpeg.png" alt="UPI QR Code" />
    
    <div class="upi-details">
      <p>UPI ID: vshakago@ybl</p>
      <p>Amount: ₹<span id="qrAmount"></span></p>
    </div>
  </div>

  <!-- UTR Form -->
  <div class="card">
    <h3>Submit Payment</h3>

    <form onsubmit="submitPayment(event)">
      <input type="text" id="name" placeholder="Your Name" required />
      <input type="text" id="phone" placeholder="Mobile Number" required />
      <input type="text" id="utr" placeholder="Enter UTR Number" required />

      <button class="submit">Submit Payment</button>
    </form>

    <p class="note">We will verify and confirm your booking</p>
  </div>

</div>

<script>

// ==========================
// 🔥 CONFIG
// ==========================
const UPI_ID = "vshakago@ybl";
const MERCHANT_NAME = "VshakaGo";

// ==========================
// 🔥 GET BOOKING DATA
// (Replace this with backend/API)
// ==========================

// Example dynamic data
const bookingData = {
  bookingId: "VS12345",
  resort: "Beach View Resort",
  date: "10 May 2026",
  amount: 1850
};

// Fill UI
document.getElementById("bookingId").innerText = bookingData.bookingId;
document.getElementById("resort").innerText = bookingData.resort;
document.getElementById("date").innerText = bookingData.date;
document.getElementById("amount").innerText = bookingData.amount;
document.getElementById("qrAmount").innerText = bookingData.amount;


// ==========================
// 💰 PAYMENT FUNCTION
// ==========================
function pay(app) {

  const amount = bookingData.amount;
  const bookingId = bookingData.bookingId;

  // Always use standard UPI link - works with all UPI apps
  const url = `upi://pay?pa=${UPI_ID}&pn=${MERCHANT_NAME}&am=${amount}&cu=INR&tn=${bookingId}`;

  // Redirect
  window.location.href = url;
}


// ==========================
// 📩 SUBMIT PAYMENT
// ==========================
function submitPayment(e) {
  e.preventDefault();

  const data = {
    bookingId: bookingData.bookingId,
    amount: bookingData.amount,
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    utr: document.getElementById("utr").value
  };

  console.log("Submitting:", data);

  // 🔥 CONNECT YOUR BACKEND HERE
  fetch('/api/save-payment', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(() => {
    alert("Payment submitted successfully!");
  })
  .catch(() => {
    alert("Error submitting payment");
  });
}

</script>

</body>
</html>
